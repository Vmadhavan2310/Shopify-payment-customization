query CartPaymentMethodsTransformRunInput {
  paymentCustomization {
    metafield(namespace: "$app:payment-customization", key: "payment-configuration") {
      value
    }
  }
  localization {
    country {
      isoCode
    }
  }

  cart {
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
      totalAmount {
        amount
        currencyCode
      }
    }
  }

  paymentMethods {
    id
    name
  }
}
